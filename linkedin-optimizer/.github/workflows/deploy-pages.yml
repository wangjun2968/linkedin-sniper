name: Deploy to Cloudflare Pages

on:
  workflow_dispatch: {}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{  secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Deploying build to Cloudflare Pages (project: linkedin-sniper)"
          npx --yes wrangler@3 pages deploy ./frontend/build --project-name linkedin-sniper --branch main --commit-message "deploy from GitHub Actions"
